<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layouts</title>
    <link rel="stylesheet" href="Layouts.css">
</head>
<body>
    <h1>Chalapathi College</h1>
    <p>Learn Today Lead Tomorrow</p>
    <nav>
        <h2>Logo</h2>
        <ul>
            <li>Home</li>
            <li>AboutUs</li>
            <li>Contact</li>
        </ul>
    </nav>
    <div>Box</div>
    <span>Hello</span>
    <span>Hello2</span>
    <div class="parent">
        <div class="child"></div>
    </div>
    <!--Flexbox Example-->
    <h2>Flexbox Example</h2>
    <div class="container">
        <div class="item">Box 1</div>
        <div class="item">Box 2</div>
        <div class="item">Box 3</div>
    </div>

    <h2>Grid Example</h2>
    <div class="container1">
        <div class="item1">1</div>
        <div class="item1">2</div>
        <div class="item1">3</div>
        <div class="item1">4</div>
    </div>

    <h2>Pseudo Classes & Elements</h2>
    <button>Hey Click Me</button>
    <!--<h2>:focus:used in forms</h2>-->
    <form>
    <label>username</label>
    <input  id="name" type="text">
    </form>
    <h2>Transformations</h2>
    <div class="box"></div>

    <h2>Hover zoom Effect</h2>
    <div class="card">Hover me</div>
    <h2>Transitions:smooth changes</h2>
    <button class="newbtn">Click Me</button>
    

</body>
</html>
